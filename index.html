    <!-- Primary Meta Tags -->
    <title>Knot | The Social Network for Design Thinkers</title>
    <meta name="title" content="Knot | The Social Network for Design Thinkers" />

    <!-- Schema.org JSON-LD - WebSite & SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Knot",
      "url": "https://knot.design/",
      "description": "A social network for designers to share ideas, work-in-progress, critiques, and creative thinking.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://knot.design/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Schema.org JSON-LD - Organization & SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": ["Organization", "SoftwareApplication"],
      "name": "Knot",
      "url": "https://knot.design",
      "logo": "https://knot.design/logo.png",
      "applicationCategory": "SocialNetworkingApplication",
      "operatingSystem": "All",
      "sameAs": [
        "https://twitter.com/knotdesign"
      ]
    }
    </script>

    <!-- Schema.org JSON-LD - FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [{
        "@type": "Question",
        "name": "What is Knot?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Knot is a social network for designers to share ideas, work-in-progress, critiques, design discussions, and creative thinking."
        }
      }, {
        "@type": "Question",
        "name": "How is Knot different from Behance?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "While Behance is primarily for polished, final portfolios, Knot focuses on the messy middle—the design process, work-in-progress, critiques, and intellectual design discussions."
        }
      }, {
        "@type": "Question",
        "name": "How is Knot different from LinkedIn?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "LinkedIn is a general professional network. Knot is tailor-made for creative professionals, with specialized tools for visual feedback, design critiques, and industry-specific discussions."
        }
      }, {
        "@type": "Question",
        "name": "Who is Knot for?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Knot is built for UI/UX Designers, Product Designers, Architects, Industrial Designers, Graphic Designers, Interior Designers, Motion Designers, Fashion Designers, and Design Students."
        }
      }, {
        "@type": "Question",
        "name": "Is Knot free?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes, Knot offers a free tier for all designers to join the community, share their work, and participate in discussions."
        }
      }, {
        "@type": "Question",
        "name": "When will Knot launch?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "We are currently in private beta. Join the waitlist today to get early access when we open up."
        }
      }]
    }
    </script>
